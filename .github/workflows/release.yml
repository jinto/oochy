name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-gui-macos:
    name: Build KittyPaw.app (${{ matrix.arch }})
    runs-on: macos-latest
    env:
      HAS_CERT: ${{ secrets.DEVELOPER_ID_CERT_BASE64 != '' }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup signing keychain
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        if: env.CERT_BASE64 != ''
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Build GUI
        run: cargo build --release --target ${{ matrix.target }} -p kittypaw-gui

      - name: Create .app bundle
        run: |
          APP_DIR="KittyPaw.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          # Copy binary
          cp "target/${{ matrix.target }}/release/kittypaw-gui" "$APP_DIR/MacOS/KittyPaw"

          # Create Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$APP_DIR/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>KittyPaw</string>
            <key>CFBundleDisplayName</key>
            <string>KittyPaw</string>
            <key>CFBundleIdentifier</key>
            <string>app.kittypaw.desktop</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>KittyPaw</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key>
            <true/>
            <key>NSMicrophoneUsageDescription</key>
            <string>KittyPaw uses the microphone for voice input.</string>
            <key>NSSpeechRecognitionUsageDescription</key>
            <string>KittyPaw uses speech recognition to convert voice to text.</string>
          </dict>
          </plist>
          EOF

      - name: Compile Swift mic helper
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET="arm64-apple-macosx11.0"
          else
            TARGET="x86_64-apple-macosx11.0"
          fi
          swiftc -O -target "$TARGET" \
            -o "$APP_DIR/MacOS/kittypaw-mic" \
            scripts/kittypaw-mic.swift \
            -framework Speech -framework AVFoundation 2>/dev/null || echo "Swift helper skipped"
        env:
          APP_DIR: KittyPaw.app/Contents

      - name: Sign app
        if: ${{ env.HAS_CERT == 'true' }}
        run: |
          codesign --force --deep --options runtime \
            -s "Developer ID Application: JAE KWON PARK (QN9P7KSSMU)" \
            KittyPaw.app

      - name: Notarize app
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent KittyPaw.app /tmp/KittyPaw.zip
          xcrun notarytool submit /tmp/KittyPaw.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun stapler staple KittyPaw.app

      - name: Create .dmg
        run: |
          DMG_NAME="KittyPaw-${{ matrix.arch }}.dmg"
          hdiutil create -volname "KittyPaw" -srcfolder "KittyPaw.app" -ov -format UDZO "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KittyPaw-${{ matrix.arch }}.dmg
          path: KittyPaw-${{ matrix.arch }}.dmg

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: kittypaw-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: kittypaw-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p kittypaw-cli

      - name: Package
        run: |
          cp "target/${{ matrix.target }}/release/kittypaw" "${{ matrix.name }}"
          chmod +x "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: [build-gui-macos, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KittyPaw-arm64.dmg/KittyPaw-arm64.dmg
            KittyPaw-amd64.dmg/KittyPaw-amd64.dmg
            kittypaw-macos-amd64/kittypaw-macos-amd64
            kittypaw-macos-arm64/kittypaw-macos-arm64
          generate_release_notes: true
