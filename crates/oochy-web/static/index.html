<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oochy Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="brand-name">oochy</span>
        <span class="brand-sub">agent dashboard</span>
      </div>
      <div class="topbar-status" id="health-status">
        <span class="status-dot"></span>
        <span class="status-text">connecting…</span>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-title">Agents</div>
        <ul class="agent-list" id="agent-list">
          <li class="agent-item placeholder">Loading…</li>
        </ul>
      </aside>

      <main class="main">
        <div class="main-empty" id="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-text">Select an agent to view conversations</div>
        </div>
        <div class="conversation-view" id="conversation-view" style="display:none">
          <div class="conv-header" id="conv-header"></div>
          <div class="messages" id="messages"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
